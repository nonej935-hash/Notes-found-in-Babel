<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes Found in Babel</title>
<link href="https://fonts.googleapis.com/css2?family=Lovato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --w: #f5f2ed; --cream: #e8e0d0; --beige: #c9b99a;
    --tan: #a08060; --mid: #5a4a3a; --dark: #2a2420; --black: #1a1410;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lovato', Georgia, serif; background: var(--w); color: var(--dark); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      repeating-linear-gradient(112deg, transparent 0, transparent 40px, rgba(200,185,160,.07) 40px, rgba(200,185,160,.07) 41px, transparent 41px, transparent 80px, rgba(160,140,110,.05) 80px, rgba(160,140,110,.05) 81px),
      repeating-linear-gradient(67deg, transparent 0, transparent 60px, rgba(255,255,255,.1) 60px, rgba(255,255,255,.1) 61px, transparent 61px, transparent 110px);
  }
  .page { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 0 2rem 5rem; }
  .page::before, .page::after {
    content: ''; position: fixed; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, transparent, var(--beige) 20%, var(--beige) 80%, transparent); opacity: .4;
  }
  .page::before { left: calc(50% - 320px); }
  .page::after  { right: calc(50% - 320px); }

  header { padding: 4.5rem 0 2.5rem; text-align: center; border-bottom: 1px solid var(--cream); margin-bottom: 3.5rem; }
  header::after { content: ''; display: block; width: 32px; height: 1px; background: var(--tan); margin: 1.8rem auto 0; }
  .site-title { font-size: 2rem; font-weight: 300; letter-spacing: .2em; text-transform: uppercase; color: var(--black); line-height: 1.2; }
  .site-subtitle { font-size: .7rem; letter-spacing: .35em; text-transform: uppercase; color: var(--tan); margin-top: .7rem; font-weight: 400; }

  .section-label { font-size: .6rem; letter-spacing: .35em; text-transform: uppercase; color: var(--beige); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 1rem; }
  .section-label::before, .section-label::after { content: ''; flex: 1; height: 1px; background: var(--cream); }

  .generator { background: #fff; border: 1px solid var(--cream); padding: 2.5rem 2rem 2rem; margin-bottom: 2.5rem; position: relative; }
  .generator::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--beige), transparent); }

  .canvas-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  #babel-canvas { width: 320px; height: 240px; image-rendering: pixelated; image-rendering: crisp-edges; border: 1px solid var(--cream); display: block; }

  .seed-row { margin-bottom: 1.2rem; border: 1px solid var(--cream); background: var(--w); overflow: hidden; }
  .seed-top { display: flex; align-items: stretch; border-bottom: 1px solid var(--cream); }
  .seed-label { font-family: 'Lovato', serif; font-size: .55rem; letter-spacing: .25em; text-transform: uppercase; color: var(--beige); padding: 0 .8rem; display: flex; align-items: center; border-right: 1px solid var(--cream); white-space: nowrap; background: var(--w); }
  .seed-actions { display: flex; border-left: 1px solid var(--cream); }
  .seed-btn { cursor: pointer; font-family: 'Lovato', serif; font-size: .55rem; letter-spacing: .15em; text-transform: uppercase; background: none; border: none; border-right: 1px solid var(--cream); color: var(--tan); padding: 0 .8rem; transition: background .15s; white-space: nowrap; }
  .seed-btn:last-child { border-right: none; }
  .seed-btn:hover { background: var(--cream); }
  .seed-chars { flex: 1; font-family: 'Courier New', monospace; font-size: .62rem; color: var(--tan); background: transparent; border: none; outline: none; padding: .55rem .6rem; min-width: 0; letter-spacing: .02em; }
  .seed-chars::placeholder { color: var(--cream); }
  #seed-area {
    width: 100%; font-family: 'Courier New', monospace; font-size: .62rem; color: var(--tan);
    background: var(--w); border: none; outline: none; resize: none;
    padding: .6rem .8rem; letter-spacing: .04em; line-height: 1.6;
    overflow: hidden; display: block;
  }

  .gen-btn { display: block; width: 100%; padding: .85rem; background: var(--dark); color: var(--w); border: none; font-family: 'Lovato', serif; font-size: .65rem; letter-spacing: .4em; text-transform: uppercase; cursor: pointer; font-weight: 400; transition: background .2s; }
  .gen-btn:hover { background: var(--black); }

  .note-section { margin-top: 1.8rem; padding-top: 1.4rem; border-top: 1px solid var(--cream); min-height: 36px; }
  .note-found { animation: fadeIn .4s ease; }
  .note-tag { font-size: .55rem; letter-spacing: .3em; text-transform: uppercase; color: var(--tan); margin-bottom: .6rem; }
  .note-text { font-size: 1.05rem; line-height: 1.85; font-weight: 300; font-style: italic; color: var(--dark); padding-left: 1rem; border-left: 1px solid var(--beige); }
  .note-empty { font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--cream); text-align: center; }
  .note-loading { font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--beige); text-align: center; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--cream); border: 1px solid var(--cream); margin-bottom: 4rem; }
  .stat { background: var(--w); padding: 1.2rem 1rem; text-align: center; }
  .stat-num { font-size: 1.2rem; font-weight: 300; color: var(--dark); letter-spacing: .05em; display: block; }
  .stat-desc { font-size: .55rem; letter-spacing: .2em; text-transform: uppercase; color: var(--beige); display: block; margin-top: .3rem; }

  footer { border-top: 1px solid var(--cream); padding-top: 2rem; text-align: center; font-size: .55rem; letter-spacing: .25em; text-transform: uppercase; color: var(--beige); line-height: 2.5; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="site-title">Notes Found in Babel</div>
    <div class="site-subtitle">A library of all possible images</div>
  </header>

  <div class="section-label">Generator</div>

  <div class="generator">
    <div class="canvas-wrap">
      <canvas id="babel-canvas" width="32" height="24"></canvas>
    </div>

    <div class="seed-row">
      <div class="seed-top">
        <span class="seed-label">Seed</span>
        <div style="flex:1;overflow:hidden;">
          <input id="seed-preview" class="seed-chars" type="text" readonly placeholder="generating…" />
        </div>
        <div class="seed-actions">
          <button class="seed-btn" onclick="copySeed()">Copy</button>
          <button class="seed-btn" onclick="lookupFromInput()">Look up</button>
        </div>
      </div>
      <textarea id="seed-area" rows="4" spellcheck="false" placeholder="Paste a 768-character seed here and press Look up to render it…"></textarea>
    </div>

    <button class="gen-btn" onclick="generate()">Generate</button>

    <div class="note-section" id="note-section">
      <div class="note-empty">—</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><span class="stat-num">32 × 24</span><span class="stat-desc">Resolution</span></div>
    <div class="stat"><span class="stat-num">0 – 3</span><span class="stat-desc">Per channel</span></div>
    <div class="stat"><span class="stat-num">768</span><span class="stat-desc">Chars per seed</span></div>
  </div>

  <footer>Notes Found in Babel &nbsp;·&nbsp; All images exist</footer>
</div>

<script>
const SEEDS_URL = 'https://raw.githubusercontent.com/nonej935-hash/Notes-found-in-Babel/main/seeds.json';
const CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzñ_'; // use of the characters "-" (hyphen/en-dash) and "+" (plus) removed due to the selection and line-breaking irregularities caused by the character.
const canvas = document.getElementById('babel-canvas');
const ctx = canvas.getContext('2d');
let currentSeed = '';
let seedsCache = null;

// encode one pixel (r,g,b each 0-3) -> single char
// pixel index in CHARS = r*16 + g*4 + b  (4^2=16, 4^1=4)
function encodePixel(r, g, b) { return CHARS[r * 16 + g * 4 + b]; }
function decodeChar(c) {
  const i = CHARS.indexOf(c);
  if (i < 0) return null;
  return { r: (i >> 4) & 3, g: (i >> 2) & 3, b: i & 3 };
}

function renderSeed(seed) {
  if (seed.length !== 768) return false;
  const img = ctx.createImageData(32, 24);
  const d = img.data;
  for (let i = 0; i < 768; i++) {
    const px = decodeChar(seed[i]);
    if (!px) return false;
    d[i*4]   = px.r * 85;
    d[i*4+1] = px.g * 85;
    d[i*4+2] = px.b * 85;
    d[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return true;
}

function generateSeed() {
  let s = '';
  for (let i = 0; i < 768; i++) s += CHARS[Math.floor(Math.random() * 64)];
  return s;
}

async function loadSeeds() {
  if (seedsCache) return seedsCache;
  try {
    const r = await fetch(SEEDS_URL + '?t=' + Date.now());
    seedsCache = await r.json();
    return seedsCache;
  } catch(e) { return {}; }
}

async function lookupSeed(seed) {
  const ns = document.getElementById('note-section');
  ns.innerHTML = '<div class="note-loading">Consulting the library…</div>';
  const seeds = await loadSeeds();
  if (seeds[seed]) {
    ns.innerHTML = `<div class="note-found"><div class="note-tag">Note found</div><div class="note-text">${esc(seeds[seed])}</div></div>`;
  } else {
    ns.innerHTML = '<div class="note-empty">—</div>';
  }
}

async function generate() {
  currentSeed = generateSeed();
  renderSeed(currentSeed);
  document.getElementById('seed-preview').value = currentSeed;
  document.getElementById('seed-area').value = currentSeed;
  await lookupSeed(currentSeed);
}

async function lookupFromInput() {
  const val = document.getElementById('seed-area').value.trim();
  if (!val) return;
  if (val.length !== 768) {
    const ns = document.getElementById('note-section');
    ns.innerHTML = '<div class="note-empty">Seed must be 768 characters.</div>';
    return;
  }
  const ok = renderSeed(val);
  if (!ok) {
    document.getElementById('note-section').innerHTML = '<div class="note-empty">Invalid seed characters.</div>';
    return;
  }
  currentSeed = val;
  document.getElementById('seed-preview').value = val;
  await lookupSeed(val);
}

function copySeed() {
  const val = currentSeed || document.getElementById('seed-area').value;
  if (!val) return;
  const ta = document.createElement('textarea');
  ta.value = val;
  ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  const btn = event.target;
  btn.textContent = 'Copied';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

generate();
</script>
</body>
</html>
